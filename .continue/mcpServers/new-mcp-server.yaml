name: New MCP server
version: 0.0.1
schema: v1
mcpServers:
  - name: Tasks
    command: npx
    args:
      - -y
      - mcp-tasks
    env: {}
  - name: SearXNGScraper
    command: npx
    args:
      - -y
      - mcp-searxng-public
    env: {
        "SEARXNG_BASE_URL": "https://search.liber.im",
        "DEFAULT_LANGUAGE": "all"
    }
  - name: ripgrep
    command: npx
    args:
      - -y
      - "mcp-ripgrep@latest"
    env: {}
  - name: shadcn-ui-mcp-server
    command: npx
    args:
      - -y
      - "@jpisnice/shadcn-ui-mcp-server"
    env: {}
  - name: vscode-mcp-server
    command: npx
    args:
      - -y
      - "vscode-mcp-server"
    env: {}
  - name: reactbits
    command: npx
    args:
      - -y
      - "reactbits-dev-mcp-server"
    env: {}
  - name: its-just-ui
    command: npx
    args:
      - -y
      - "its-just-mcp"
    env: {}
  - name: usehooks
    command: npx
    args:
      - -y
      - "mcp-usehooks"
    env: {}
  - name: lsmcp
    command: npx
    args:
      - -y
      - "@mizchi/lsmcp"
      - -p
      - "tsgo"
    env: {}
  - name: heroicons
    command: npx
    args:
      - -y
      - "heroicons-mcp"
      - "--stdio"
    env: {}

